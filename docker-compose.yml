# Ola ERP CRM — 生产部署 compose（Box1 = app）
# 三箱拓扑：Box1 跑 backend + mcp + frontend，Box3 跑 gotenberg，Box2 跑 nanobot
# 公网入口：CF Proxy (Flexible) → Box1:80 → nginx-in-frontend → backend:8888
# Tailscale 跨机：Box2 nanobot → Box1 mcp (100.109.220.126:8889) → backend (MongoDB)
# 使用: 在 Box1 上 cd 到项目目录，配置 backend/.env 后执行 docker compose up -d --build
#
# 环境变量（必填）：
#   MCP_BIND_ADDR — MCP 对外暴露绑定地址。**必须在项目根 .env 里设置**。
#                    单机本地 dev：MCP_BIND_ADDR=127.0.0.1
#                    生产分机部署：MCP_BIND_ADDR=<Box1 Tailscale IP>，如 100.109.220.126
#                    没设这个变量 docker compose up 直接报错退出，不允许静默 fallback —
#                    历史教训：之前用 ${MCP_BIND_ADDR:-127.0.0.1} 默认值，重启时 shell
#                    env 丢失就会悄悄退化到 loopback，nanobot 跨机连不到 MCP。

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # 只绑 loopback：nginx-in-frontend 通过 docker 网络连 backend:8888，
    # 公网访问必须经 CF→nginx→/api→backend，不暴露裸 API 端口
    ports:
      - "127.0.0.1:8888:8888"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: "8888"
    volumes:
      # 上传文件持久化，避免 docker compose up -d --build 每次擦掉 logo 等资产
      - crm-uploads:/usr/src/app/src/public/uploads
    restart: unless-stopped

  # MCP server 独立容器（与 backend 同镜像，command 覆盖入口），
  # 因为 backend Dockerfile CMD 是 `npm start` 只拉主 API 进程，
  # MCP 需要独立 Node 进程。详见 backend/src/mcp/README.md
  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node src/mcp/server.js
    # 绑定地址通过 MCP_BIND_ADDR 控制（必须显式设置，无默认值）：
    # - 本地 dev：项目根 .env 里 MCP_BIND_ADDR=127.0.0.1（只 loopback）
    # - 生产分机：项目根 .env 里 MCP_BIND_ADDR=<Box1 Tailscale IP>
    # ${VAR:?msg} 语法：如果没设 VAR，docker compose up 立刻报错退出（fail-fast）
    ports:
      - "${MCP_BIND_ADDR:?MCP_BIND_ADDR must be set in /app/crm/.env (e.g. 100.109.220.126 for prod, 127.0.0.1 for local dev)}:8889:8889"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      # 容器内部绑 0.0.0.0，由上面的 ports 映射决定对外暴露哪个宿主接口
      MCP_HOST: "0.0.0.0"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      # 不再传 VITE_BACKEND_SERVER / VITE_APP_API_URL build args —— frontend 走 same-origin
      # 相对路径（/api、/download、/export、/public），访问任何域名都打同源 backend
      # 这样一份 build 同时为 app.olajob.cn / app.olatech.ai / 未来新域名 服务，无需重新构建
    # Cloudflare proxy 只支持标准端口（80/443/8080/...），自定义 3000 不被代理
    # 所以 host 端口直接用 80，CF → Box1:80 → nginx-in-frontend → backend:8888
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  crm-uploads:

# 注意：
# - gotenberg 不再在本 compose 中，它在 Box3 独立运行
#   Box3: docker run -d --name gotenberg --restart unless-stopped -p 3000:3000 gotenberg/gotenberg:8
# - backend/.env 必须包含 GOTENBERG_URL / NANOBOT_HOST / NANOBOT_PORT / MCP_SERVICE_TOKEN / GEMINI_API_KEY 等
# - ALLOWED_ORIGINS / PUBLIC_SERVER_FILE 等也从 backend/.env 读取
# - 分机部署时 项目根 .env 必须有 MCP_BIND_ADDR=<Box1 Tailscale IP>（例 100.109.220.126），
#   .env 已 commit 到仓库（不含密钥），git pull 后无需手工 export
